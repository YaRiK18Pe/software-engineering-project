name: Lab 3 Dedicated Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-lab3

jobs:
  # 1. LINTING
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd  D:\SELab\lab3\mongoapp
          npm install
      
      - name: Run Lint
        run: |
          cd  D:\SELab\lab3\mongoapp
          npm run lint || true   # щоб не падало

  # 2. BUILD AND PUSH
  build-and-push:
    needs: lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./lab3/mongoapp
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  # 3. PERFORMANCE TESTS
  performance-tests:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Services
        run: |
          cd lab3/mongoapp
          docker compose up -d

      - name: Wait for app
        run: |
          cd lab3/mongoapp
          for i in {1..10}; do
            if docker compose exec app curl -f http://localhost:3000; then
              echo "App is ready"
              break
            else
              echo "Waiting for app..."
              sleep 5
            fi
          done

      - name: Run k6 Tests
        continue-on-error: true
        run: |
          cd lab3/mongoapp
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/load_test.js
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/stress_test.js
          docker compose run --rm -e BASE_URL=http://app:3000 k6 run /scripts/ci_thresholds_test.js

      - name: Cleanup
        if: always()
        run: |
          cd lab3/mongoapp
          docker compose down